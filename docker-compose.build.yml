services:
  matchbox:
    build:
      context: ../matchbox/matchbox-server
      dockerfile: ../../matchbox_docker/Dockerfile
      additional_contexts:
        ig_dir: ./igs
      platforms:
        - linux/amd64
        - linux/arm64
    image: croeder/matchbox:r4

  matchbox-r5:
    build:
      context: ../matchbox/matchbox-server
      dockerfile: ../../matchbox_docker/Dockerfile.r5
      platforms:
        - linux/amd64
        - linux/arm64
    image: croeder/matchbox:r5
